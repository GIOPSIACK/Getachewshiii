kind = "web"
previewPath = "/"
title = "Gech EV Makina Ekub"
version = "1.0.0"
id = "artifacts/gech-ev"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25273

[services.development]
run = "pnpm --filter @workspace/gech-ev run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/gech-ev", "run", "build" ]
serve = "static"
publicDir = "artifacts/gech-ev/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25273"
BASE_PATH = "/"
